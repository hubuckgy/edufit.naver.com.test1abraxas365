<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>에듀-트립 인공지능 기획 지능 v16.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --secondary: #a855f7; --bg: #0a0f1e; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); color: #f1f5f9; min-height: 100vh; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .grad-purple { background: linear-gradient(135deg, #6366f1, #a855f7); }
        .btn-primary { background: linear-gradient(135deg, #6366f1, #a855f7); transition: all 0.2s; }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
        .theme-chip { font-size: 11px; padding: 6px 12px; border-radius: 20px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: 0.2s; position: relative; }
        .theme-chip.active { background: #6366f1; border-color: #6366f1; color: white; box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3); }
        .theme-chip .tip {
            visibility: hidden; opacity: 0;
            position: absolute; bottom: 130%; left: 50%; transform: translateX(-50%);
            background: #1e293b; color: #e2e8f0; font-size: 10px; font-weight: 400;
            padding: 6px 10px; border-radius: 8px; white-space: nowrap;
            border: 1px solid rgba(255,255,255,0.12); box-shadow: 0 8px 20px rgba(0,0,0,0.5);
            transition: opacity 0.18s; z-index: 60; pointer-events: none;
        }
        .theme-chip .tip::after {
            content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%);
            border: 5px solid transparent; border-top-color: #1e293b;
        }
        .theme-chip:hover .tip { visibility: visible; opacity: 1; }
        .day-card { border-radius: 1.5rem; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
        .spinner { width: 2rem; height: 2rem; border: 3px solid rgba(255,255,255,0.1); border-top-color: #6366f1; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        input, select { background: rgba(15, 23, 42, 0.9); border: 1px solid rgba(255, 255, 255, 0.1); color: #f1f5f9; padding: 0.6rem; border-radius: 0.75rem; font-size: 0.85rem; width: 100%; outline: none; }
        input:focus, select:focus { border-color: #6366f1; box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2); }
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        .score-badge { font-size: 9px; padding: 1px 6px; border-radius: 6px; background: rgba(16,185,129,0.15); color: #34d399; border: 1px solid rgba(16,185,129,0.25); }
        .grade-btn { font-size: 11px; padding: 6px 0; border-radius: 0.6rem; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: 0.2s; text-align:center; }
        .grade-btn.active { background:#6366f1; border-color:#6366f1; color:#fff; }
    </style>
</head>
<body>

<header class="glass sticky top-0 z-50 px-6 py-4 flex flex-wrap items-center justify-between gap-4 border-b border-white/5">
    <div class="flex items-center gap-3">
        <div class="w-10 h-10 grad-purple rounded-xl flex items-center justify-center text-white font-black shadow-lg">ET</div>
        <div>
            <h1 class="text-lg font-black tracking-tight">에듀-트립 <span class="text-indigo-400">v16.0</span></h1>
            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">인공지능 추천 엔진 탑재</p>
        </div>
    </div>
    <div class="flex items-center gap-3">
        <div id="statusIndicators" class="flex gap-2">
            <div class="flex flex-col items-center"><span class="text-[8px] text-slate-500">관광</span><div id="tourStatus" class="w-1.5 h-1.5 rounded-full bg-slate-700"></div></div>
            <div class="flex flex-col items-center"><span class="text-[8px] text-slate-500">교육</span><div id="neisStatus" class="w-1.5 h-1.5 rounded-full bg-slate-700"></div></div>
        </div>
        <button onclick="toggleSettings()" class="bg-white/5 hover:bg-white/10 p-2 rounded-lg text-xs font-bold border border-white/10 transition">⚙️ 인증키 설정</button>
    </div>
</header>

<div id="settingsPanel" class="hidden glass m-4 p-6 rounded-2xl border border-indigo-500/30 max-w-2xl mx-auto">
    <h3 class="font-bold text-sm mb-4 flex items-center gap-2">🔑 API 인증키 설정</h3>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="space-y-1">
            <label class="text-[10px] text-slate-400 ml-1">관광공사 (TourAPI) — 일반 인증키(Decoding)</label>
            <input type="password" id="tourKey" placeholder="일반 인증키(Decoding) 입력" class="text-xs">
        </div>
        <div class="space-y-1">
            <label class="text-[10px] text-slate-400 ml-1">교육행정정보망 (NEIS) — 선택 사항</label>
            <input type="password" id="neisKey" placeholder="없어도 일정 생성 가능" class="text-xs">
        </div>
    </div>
    <p class="text-[10px] text-amber-400/80 mt-3">※ NEIS 키가 없거나 학교 검색이 막혀도, 아래 '학교급 직접 선택'으로 일정을 만들 수 있습니다.</p>
    <div class="mt-4 flex justify-end gap-2">
        <button onclick="toggleSettings()" class="px-4 py-2 text-xs font-bold text-slate-400">취소</button>
        <button onclick="saveKeys()" class="btn-primary px-6 py-2 rounded-lg text-xs font-bold text-white">설정 저장</button>
    </div>
</div>

<div class="max-w-[1600px] mx-auto p-4 md:p-8 flex flex-col lg:flex-row gap-8">

    <aside class="w-full lg:w-80 flex-shrink-0 space-y-6">
        <div class="glass rounded-3xl p-6 space-y-5">
            <div>
                <label class="text-xs font-extrabold text-indigo-400 uppercase mb-2 block">1. 학교 (선택)</label>
                <div class="flex gap-2 mb-2">
                    <input id="schoolSearchInput" type="text" placeholder="학교명 입력" class="text-sm">
                    <button onclick="searchSchool()" class="btn-primary px-3 rounded-xl text-xs font-bold">검색</button>
                </div>
                <div id="schoolList" class="max-h-32 overflow-y-auto custom-scroll space-y-1 mb-2"></div>
                <div id="selectedSchoolDisplay" class="text-xs font-black text-emerald-400 bg-emerald-500/10 p-2 rounded-lg hidden mb-2"></div>

                <!-- [신규] 학교급 직접 선택 (NEIS 없이도 일정 생성 가능) -->
                <label class="text-[10px] text-slate-500 ml-1">학교 검색이 안 될 때 — 학교급 직접 선택</label>
                <div id="gradePicker" class="grid grid-cols-3 gap-2 mt-1">
                    <div class="grade-btn" onclick="pickGrade(this,'초등')">초등학교</div>
                    <div class="grade-btn" onclick="pickGrade(this,'중등')">중학교</div>
                    <div class="grade-btn" onclick="pickGrade(this,'고등')">고등학교</div>
                </div>
            </div>

            <div class="grid grid-cols-1 gap-3">
                <div class="space-y-1">
                    <label class="text-[10px] text-slate-500 ml-1">목적지 (시/도)</label>
                    <select id="sido" onchange="populateDistricts()"></select>
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] text-slate-500 ml-1">세부 지역 (시/군/구)</label>
                    <select id="sigungu"></select>
                </div>
            </div>

            <div class="space-y-1">
                <label class="text-xs font-extrabold text-indigo-400 uppercase mb-2 block">2. 여행 성격</label>
                <select id="travelPurpose">
                    <option value="educational">현장체험학습 (교육 중심)</option>
                    <option value="retreat">수련활동 (공동체 중심)</option>
                    <option value="graduation">졸업여행 (추억 중심)</option>
                    <option value="career">진로탐색 (미래 중심)</option>
                </select>
            </div>

            <div class="space-y-2">
                <div class="flex items-center justify-between">
                    <label class="text-[10px] text-slate-500 ml-1">관심 테마 (여러 개 선택 가능 · 마우스를 올리면 설명)</label>
                    <span id="themeCount" class="text-[9px] text-indigo-400 font-bold">0개 선택</span>
                </div>
                <div id="themeContainer" class="flex flex-wrap gap-2"></div>
            </div>

            <button onclick="generatePlan()" class="btn-primary w-full py-4 rounded-2xl font-black text-sm shadow-xl shadow-indigo-500/20 mt-4">
                인공지능 일정 생성 시작
            </button>
        </div>

        <div id="logConsole" class="glass rounded-2xl p-4 h-44 overflow-y-auto custom-scroll font-mono text-[10px] text-emerald-400/80">
            > 시스템 대기 중...
        </div>
    </aside>

    <main class="flex-1 min-w-0">
        <div id="itineraryGrid" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="col-span-full glass rounded-[2.5rem] p-20 text-center border-dashed border-2 border-white/5">
                <p class="text-4xl mb-6">🗺️</p>
                <h2 class="text-2xl font-black text-slate-300">완벽한 교육 여행의 시작</h2>
                <p class="text-slate-500 mt-2">학교를 검색하거나 학교급을 직접 선택한 뒤 AI 엔진을 가동하세요.</p>
            </div>
        </div>
    </main>
</div>

<script>
// ===================== 지역 데이터 =====================
const REGIONS = {

  "부산광역시": {code: 6, dist: ["중구","서구","동구","영도구","부산진구","동래구","남구","북구","해운대구","사하구","금정구","강서구","연제구","수영구","사상구","기장군"]},
  "대구광역시": {code: 4, dist: ["중구","동구","서구","남구","북구","수성구","달서구","달성군","군위군"]},
  "인천광역시": {code: 2, dist: ["중구","동구","미추홀구","연수구","남동구","부평구","계양구","서구","강화군","옹진군"]},
  "광주광역시": {code: 5, dist: ["동구","서구","남구","북구","광산구"]},
  "대전광역시": {code: 3, dist: ["동구","중구","서구","유성구","대덕구"]},
  "울산광역시": {code: 7, dist: ["중구","남구","동구","북구","울주군"]},
  "세종특별자치시": {code: 8, dist: ["세종시"]},
  "경기도": {code: 31, dist: ["수원시","성남시","의정부시","안양시","부천시","광명시","평택시","동두천시","안산시","고양시","과천시","구리시","남양주시","오산시","시흥시","군포시","의왕시","하남시","용인시","파주시","이천시","안성시","김포시","화성시","광주시","양주시","포천시","여주시","연천군","가평군","양평군"]},
  "강원특별자치도": {code: 32, dist: ["춘천시","원주시","강릉시","동해시","태백시","속초시","삼척시","홍천군","횡성군","영월군","평창군","정선군","철원군","화천군","양구군","인제군","고성군","양양군"]},
  "충청북도": {code: 33, dist: ["청주시","충주시","제천시","보은군","옥천군","영동군","증평군","진천군","괴산군","음성군","단양군"]},
  "충청남도": {code: 34, dist: ["천안시","공주시","보령시","아산시","서산시","논산시","계룡시","당진시","금산군","부여군","서천군","청양군","홍성군","예산군","태안군"]},
  "전북특별자치도": {code: 37, dist: ["전주시","군산시","익산시","정읍시","남원시","김제시","완주군","진안군","무주군","장수군","임실군","순창군","고창군","부안군"]},
  "전라남도": {code: 38, dist: ["목포시","여수시","순천시","나주시","광양시","담양군","곡성군","구례군","고흥군","보성군","화순군","장흥군","강진군","해남군","영암군","무안군","함평군","영광군","장성군","완도군","진도군","신안군"]},
  "경상북도": {code: 35, dist: ["포항시","경주시","김천시","안동시","구미시","영주시","상주시","영천시","경산시","의성군","청송군","영양군","영덕군","청도군","고령군","성주군","칠곡군","예천군","봉화군","울진군","울릉군"]},
  "경상남도": {code: 36, dist: ["창원시","진주시","통영시","사천시","김해시","밀양시","거제시","양산시","의령군","함안군","창녕군","고성군","남해군","하동군","산청군","함양군","거창군","합천군"]},
  "제주특별자치도": {code: 39, dist: ["제주시","서귀포시"]}
};

// ===================== 테마 정의 =====================
const THEMES = [
  { id:'history',   label:'#역사유적',  desc:'궁궐·고분·읍성 등 역사 현장 학습',        catCodes:['A0201'],          contentTypes:['12'] },
  { id:'museum',    label:'#박물관',    desc:'유물·전시 중심의 실내 학습 공간',         catCodes:['A0206'],          contentTypes:['14'] },
  { id:'science',   label:'#과학관',    desc:'체험형 과학·우주·천문 전시 시설',         catCodes:['A0206'],          contentTypes:['14'] },
  { id:'nature',    label:'#자연생태',  desc:'국립공원·숲·생태 탐방로 등 자연 관찰',     catCodes:['A0101'],          contentTypes:['12'] },
  { id:'marine',    label:'#해양바다',  desc:'해변·항구·등대 등 바다 연계 코스',         catCodes:['A0102'],          contentTypes:['12'] },
  { id:'art',       label:'#문화예술',  desc:'미술관·공연장·예술마을 감상 활동',         catCodes:['A0206','A0207'],  contentTypes:['14'] },
  { id:'heritage',  label:'#전통문화',  desc:'한옥마을·서원·전통 체험 마을',            catCodes:['A0203','A0201'],  contentTypes:['12','14'] },
  { id:'activity',  label:'#액티비티',  desc:'레저·모험·놀이형 신체 활동',             catCodes:['A0203'],          contentTypes:['28'] },
  { id:'security',  label:'#안보교육',  desc:'전적지·안보관 등 평화·안보 학습',         catCodes:['A0201'],          contentTypes:['12'] },
  { id:'industry',  label:'#산업견학',  desc:'기업·공장·첨단시설 진로 탐방',           catCodes:['A0202'],          contentTypes:['14','12'] },
  { id:'festival',  label:'#축제행사',  desc:'지역 축제·문화 행사 참여',               catCodes:['A0207','A0208'],  contentTypes:['15'] }
];

const GRADE_PROFILE = {
  '초등': { days: 2, spotsPerDay: 3, intensity: '낮음', note: '도보 이동 최소화, 안전·휴식 위주' },
  '중등': { days: 3, spotsPerDay: 4, intensity: '보통', note: '체험형 활동 중심, 적정 동선' },
  '고등': { days: 3, spotsPerDay: 4, intensity: '높음', note: '진로·심화 학습 연계, 자율 동선 허용' }
};

const PURPOSE_WEIGHT = {
  educational: { history:1.5, museum:1.5, science:1.5, art:1.3, heritage:1.4, nature:1.1, security:1.3, industry:1.1, marine:1.0, activity:0.8, festival:0.9 },
  retreat:     { activity:1.6, nature:1.5, marine:1.3, heritage:1.0, festival:1.1, history:0.9, museum:0.8, science:0.8, art:0.9, security:1.0, industry:0.8 },
  graduation:  { activity:1.5, nature:1.3, marine:1.4, festival:1.3, art:1.2, heritage:1.1, history:0.9, museum:0.8, science:0.8, security:0.8, industry:0.8 },
  career:      { science:1.7, industry:1.7, museum:1.3, art:1.2, history:1.0, heritage:1.0, nature:0.9, activity:0.9, marine:0.9, security:0.9, festival:0.8 }
};

let selectedSchool = null;       // { name, type }
let selectedThemes = new Set();
let apiKeys = { tour: '', neis: '' };

// ===================== 초기화 =====================
window.onload = () => {
    document.getElementById('sido').innerHTML =
        Object.keys(REGIONS).map(r => `<option value="${r}">${r}</option>`).join('');
    populateDistricts();
    renderThemes();
    loadKeys();
};

function log(msg, type='info') {
    const c = document.getElementById('logConsole');
    const color = type === 'error' ? 'text-red-400' : type === 'warn' ? 'text-amber-400' : 'text-emerald-400';
    c.innerHTML += `<div class="${color}">> ${msg}</div>`;
    c.scrollTop = c.scrollHeight;
}

function toggleSettings() { document.getElementById('settingsPanel').classList.toggle('hidden'); }

function renderThemes() {
    document.getElementById('themeContainer').innerHTML = THEMES.map(t => `
        <span class="theme-chip" data-id="${t.id}" onclick="toggleTheme(this,'${t.id}')">
            ${t.label}
            <span class="tip">${t.desc}</span>
        </span>`).join('');
}
function toggleTheme(el, id) {
    if (selectedThemes.has(id)) { selectedThemes.delete(id); el.classList.remove('active'); }
    else { selectedThemes.add(id); el.classList.add('active'); }
    document.getElementById('themeCount').textContent = `${selectedThemes.size}개 선택`;
}
function populateDistricts() {
    const sido = document.getElementById('sido').value;
    document.getElementById('sigungu').innerHTML =

// ===================== 프록시 (NEIS·TourAPI 공용) =====================
async function fetchWithProxy(targetUrl, expect='json') {
    const proxies = [
        u => `https://corsproxy.io/?url=${encodeURIComponent(u)}`,
        u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
        u => `https://thingproxy.freeboard.io/fetch/${u}`
    ];
    let lastErr = '';
    for (let i = 0; i < proxies.length; i++) {
        try {
            const res = await fetch(proxies[i](targetUrl));
            if (!res.ok) { lastErr = `HTTP ${res.status}`; continue; }
            const text = await res.text();
            if (!text || !text.trim()) { lastErr = '빈 응답'; continue; }
            // JSON 기대인데 HTML/XML 오류 페이지가 온 경우
            if (expect === 'json' && text.trim().startsWith('<')) {
                lastErr = '서버가 JSON 대신 오류 페이지 반환 (키 미승인/트래픽 초과 가능)';
                continue;
            }
            log(`프록시 ${i+1}번 경유 응답 수신.`);
            return JSON.parse(text);
        } catch (e) { lastErr = e.message; }
    }
    throw new Error(lastErr || '모든 프록시 연결 실패');
}

// ===================== [수정] 학교 검색 — 프록시 경유 =====================
async function searchSchool() {
    const name = document.getElementById('schoolSearchInput').value.trim();
    if (!name) return alert("학교명을 입력하세요.");
    if (!apiKeys.neis) return alert("NEIS 인증키가 없습니다. 아래 '학교급 직접 선택'을 이용하세요.");

    const listBox = document.getElementById('schoolList');
    listBox.innerHTML = '<div class="text-[10px] text-slate-500 p-2">검색 중...</div>';

    // NEIS는 CORS 차단 → 반드시 프록시 경유
    const neisUrl = `https://open.neis.go.kr/hub/schoolInfo?KEY=${encodeURIComponent(apiKeys.neis)}&Type=json&pIndex=1&pSize=15&SCHUL_NM=${encodeURIComponent(name)}`;
    try {
        const data = await fetchWithProxy(neisUrl, 'json');

        // NEIS 오류 응답 처리 (RESULT.CODE 형태로 옴)
        if (data.RESULT) {
            log(`NEIS 응답: ${data.RESULT.CODE} - ${data.RESULT.MESSAGE}`, 'warn');
            listBox.innerHTML = `<div class="text-[10px] text-amber-400 p-2">검색 결과 없음 (${data.RESULT.MESSAGE}). 학교급 직접 선택을 이용하세요.</div>`;
            return;
        }
        const rows = (data.schoolInfo && data.schoolInfo[1]) ? data.schoolInfo[1].row : [];
        if (!rows.length) {
            listBox.innerHTML = '<div class="text-[10px] text-amber-400 p-2">검색된 학교가 없습니다.</div>';
            return;
        }
        listBox.innerHTML = rows.map(r => {
            const nm = (r.SCHUL_NM || '').replace(/'/g, '');
            return `<div onclick="selectSchool('${nm}','${r.SCHUL_KND_SC_NM}')"
                class="p-2 bg-white/5 hover:bg-indigo-500/20 cursor-pointer rounded-lg text-[11px] border border-white/5 transition">
                ${r.SCHUL_NM} <span class="text-slate-500">(${r.LCTN_SC_NM})</span></div>`;
        }).join('');
        log(`학교 ${rows.length}건 검색 완료.`);
    } catch (e) {
        listBox.innerHTML = '<div class="text-[10px] text-rose-400 p-2">검색 실패. 학교급 직접 선택을 이용하세요.</div>';
        log("학교 검색 오류: " + e.message, "error");
    }
}
function selectSchool(name, type) {
    selectedSchool = { name, type: type.includes('초등') ? '초등' : type.includes('중학') ? '중등' : '고등' };
    const d = document.getElementById('selectedSchoolDisplay');
    d.textContent = `✅ ${name} (${selectedSchool.type})`;
    d.classList.remove('hidden');
    document.getElementById('schoolList').innerHTML = '';
    document.querySelectorAll('#gradePicker .grade-btn').forEach(b => b.classList.remove('active'));
    log(`${name} 선택됨 → ${selectedSchool.type} 프로필 적용.`);
}

// ===================== 추천 엔진: 점수화 =====================
function scoreSpot(spot, themeObjs, purpose) {
    let score = 1;
    const cat = (spot.cat3 || spot.cat2 || spot.cat1 || '');
    const ctype = String(spot.contenttypeid || '');
    const weights = PURPOSE_WEIGHT[purpose] || {};
    let matchedAny = false;
    themeObjs.forEach(t => {
        const w = weights[t.id] || 1;
        let hit = 0;
        if (t.catCodes.some(c => cat.startsWith(c))) hit += 3;
        if (t.contentTypes.includes(ctype))         hit += 1.5;
        if (hit > 0) { score += hit * w; matchedAny = true; }
    });
    if (themeObjs.length === 0) {
        THEMES.forEach(t => {
            if (t.catCodes.some(c => cat.startsWith(c))) score += (weights[t.id] || 1);
        });
    }
    if (spot.firstimage) score += 0.5;
    if (spot.overview) score += 0.3;
    if (matchedAny) score += 0.5;
    return score;
}

// ===================== AI 일정 생성 =====================
async function generatePlan() {
    if (!selectedSchool) return alert("학교를 검색하거나 '학교급 직접 선택'을 먼저 해주세요.");
    if (!apiKeys.tour)   return alert("관광공사(TourAPI) 인증키를 설정하세요.");

    const purpose = document.getElementById('travelPurpose').value;
    const themeObjs = THEMES.filter(t => selectedThemes.has(t.id));
    const profile = GRADE_PROFILE[selectedSchool.type] || GRADE_PROFILE['중등'];
    const grid = document.getElementById('itineraryGrid');
    const sido = document.getElementById('sido').value;
    const areaCode = REGIONS[sido].code;

    grid.innerHTML = '<div class="col-span-full py-20 text-center"><div class="spinner mx-auto mb-4"></div><p class="text-slate-400">AI 엔진이 최적의 일정을 분석 중입니다...</p></div>';
    log(`일정 생성 시작 — ${sido} / 목적:${purpose} / 테마:${themeObjs.length}개`);

    try {
        let ctypes = [...new Set(themeObjs.flatMap(t => t.contentTypes))];
        if (ctypes.length === 0) ctypes = ['12','14','28'];

        let pool = [];
        for (const ct of ctypes) {
            const params = {
                serviceKey: apiKeys.tour, numOfRows: 60, pageNo: 1,
                MobileOS: 'ETC', MobileApp: 'EduTrip', _type: 'json',
                contentTypeId: ct, areaCode: areaCode, arrange: 'O'
            };
            const qs = Object.entries(params).map(([k,v]) => `${k}=${encodeURIComponent(v)}`).join('&');
            const url = `https://apis.data.go.kr/B551011/KorService1/areaBasedList1?${qs}`;
            try {
                const data = await fetchWithProxy(url, 'json');
                const hdr = data.response?.header;
                if (hdr && hdr.resultCode && hdr.resultCode !== '0000') {
                    log(`TourAPI 응답코드 ${hdr.resultCode}: ${hdr.resultMsg}`, 'warn');
                }
                let items = data.response?.body?.items?.item || [];
                items = Array.isArray(items) ? items : [items];
                pool.push(...items);
                log(`콘텐츠타입 ${ct}: ${items.length}건 수집.`);
            } catch (e) {
                log(`콘텐츠타입 ${ct} 수집 실패: ${e.message}`, 'warn');
            }
        }

        const seen = new Set();
        pool = pool.filter(s => {
            if (!s || !s.title) return false;
            const id = s.contentid || s.title;
            if (seen.has(id)) return false;
            seen.add(id); return true;
        });

        if (pool.length === 0) {
            grid.innerHTML = '<div class="col-span-full glass p-10 text-center text-amber-400 font-bold">관광 데이터를 가져오지 못했습니다.<br><span class="text-xs text-slate-400 font-normal">로그 콘솔의 오류 메시지를 확인하세요. 대부분 TourAPI 키 미승인 또는 트래픽 초과입니다.</span></div>';
            log('수집된 관광지 0건. 일정 생성 중단.', 'error');
            return;
        }

        const ranked = pool
            .map(s => ({ spot: s, score: scoreSpot(s, themeObjs, purpose) }))
            .sort((a,b) => b.score - a.score);

        const totalNeeded = profile.days * profile.spotsPerDay;
        const picked = ranked.slice(0, Math.min(totalNeeded, ranked.length));
        log(`후보 ${pool.length}곳 분석 → 상위 ${picked.length}곳 선정.`);

        let html = '';
        let idx = 0;
        const purposeLabel = { educational:'현장체험학습', retreat:'수련활동', graduation:'졸업여행', career:'진로탐색' }[purpose];
        for (let day = 1; day <= profile.days; day++) {
            const daySpots = picked.slice(idx, idx + profile.spotsPerDay);
            idx += profile.spotsPerDay;
            if (daySpots.length === 0) break;

            const rows = daySpots.map((item, i) => {
                const s = item.spot;
                const time = ['09:30','11:30','14:00','16:00'][i] || '일정';
                const mapLink = (s.mapx && s.mapy)
                    ? `https://map.kakao.com/link/map/${encodeURIComponent(s.title)},${s.mapy},${s.mapx}`
                    : `https://map.kakao.com/?q=${encodeURIComponent(s.title)}`;
                return `
                <div class="flex gap-4 items-start py-3 border-b border-white/5 last:border-0 group">
                    <div class="text-[10px] font-black text-indigo-400 w-10 flex-shrink-0 pt-1">${time}</div>
                    <div class="min-w-0 flex-1">
                        <div class="flex items-center gap-2">
                            <div class="text-xs font-black group-hover:text-indigo-300 transition truncate">${s.title}</div>
                            <span class="score-badge flex-shrink-0">적합도 ${item.score.toFixed(1)}</span>
                        </div>
                        <div class="text-[10px] text-slate-500 truncate mt-0.5">${s.addr1 || '상세 주소 없음'}</div>
                        <div class="flex gap-2 mt-2">
                            <a href="${mapLink}" target="_blank" class="text-[9px] bg-white/5 hover:bg-white/10 px-2 py-1 rounded text-slate-400">지도보기</a>
                        </div>
                    </div>
                    ${s.firstimage ? `<img src="${s.firstimage}" class="w-14 h-14 rounded-xl object-cover shadow-lg">` : ''}
                </div>`;
            }).join('');

            html += `
            <div class="day-card glass">
                <div class="grad-purple px-5 py-3 text-xs font-black flex justify-between items-center">
                    <span>제 ${day}일</span>
                    <span class="text-[10px] opacity-80 bg-black/20 px-2 py-0.5 rounded-full">${purposeLabel}</span>
                </div>
                <div class="p-5">
                    <div class="flex flex-wrap gap-1.5 mb-4">
                        ${themeObjs.length > 0
                            ? themeObjs.map(t => `<span class="text-[9px] px-2 py-0.5 rounded-md bg-indigo-500/10 text-indigo-400 border border-indigo-500/20">${t.label}</span>`).join('')
                            : '<span class="text-[9px] px-2 py-0.5 rounded-md bg-slate-500/10 text-slate-400">#AI추천(목적기반)</span>'}
                    </div>
                    <div class="space-y-1">${rows}</div>
                    <div class="mt-4 pt-4 border-t border-white/5">
                        <div class="flex items-center gap-2">
                            <div class="w-1.5 h-1.5 rounded-full bg-emerald-500"></div>
                            <span class="text-[10px] font-bold text-slate-400">${selectedSchool.type} 특화 (활동강도 ${profile.intensity}): ${profile.note}</span>
                        </div>
                    </div>
                </div>
            </div>`;
        }
        grid.innerHTML = html;
        log(`${selectedSchool.name} 맞춤형 ${profile.days}일 일정 생성 완료. 🎉`);
    } catch (e) {
        grid.innerHTML = '<div class="col-span-full glass p-10 text-center text-rose-400 font-bold">일정 생성 실패<br><span class="text-xs text-slate-400 font-normal">' + e.message + '</span></div>';
        log("치명적 오류: " + e.message, "error");
    }
}
